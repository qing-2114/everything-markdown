<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>everything-markdown</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-labelledby="appTitle">
        <div class="title-lockup">
          <div class="brand-mark" aria-hidden="true">MD</div>
          <div>
            <h1 id="appTitle">everything-markdown</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <label class="language-switcher" for="languageSelect">
            <span id="languageLabel">语言</span>
            <select id="languageSelect">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </label>
          <div class="status-pill" id="statusPill" aria-live="polite">等待文件</div>
        </div>
      </section>

      <section class="workspace" aria-label="Markdown 转换工作台">
        <div class="conversion-grid">
          <div class="queue-panel">
            <div class="drop-zone" id="fileDropZone">
              <div class="file-icon" id="fileIcon" aria-hidden="true">FILES</div>
              <div class="file-copy">
                <span class="section-label">源文件队列</span>
                <h2 id="fileTitle">选择或拖入多个文件开始转换</h2>
                <p id="fileMeta">支持 PDF、Word、PowerPoint、Excel、HTML、CSV、JSON、XML 和 TXT。</p>
                <button class="primary-button" id="selectFileButton" type="button">选择文件</button>
              </div>
            </div>

            <div class="queue-list-shell">
              <div class="queue-list-header">
                <span>文件队列</span>
                <div class="queue-actions">
                  <button class="text-button" id="retryFailedButton" type="button" disabled>重试失败</button>
                  <button class="text-button" id="clearCompletedButton" type="button" disabled>清除成功</button>
                  <button class="text-button" id="clearQueueButton" type="button" disabled>清空队列</button>
                </div>
              </div>
              <div class="queue-list" id="queueList" aria-live="polite">
                <p class="empty-queue">还没有文件。你可以点击选择文件，或把文件拖到上方区域。</p>
              </div>
            </div>
          </div>

          <aside class="side-panel" aria-label="转换设置">
            <div class="settings-row">
              <div class="setting-copy">
                <span>输出位置</span>
                <strong id="outputDirText">尚未选择保存位置</strong>
              </div>
              <button class="secondary-button" id="selectOutputButton" type="button">选择文件夹</button>
            </div>

            <div class="action-row">
              <div class="progress-summary" id="progressSummary">0 个文件等待转换</div>
              <button class="convert-button" id="convertButton" type="button" disabled>
                <span id="convertButtonText">转换为 Markdown</span>
              </button>
              <p id="hintText">先添加文件，再选择 Markdown 的保存位置。</p>
            </div>

            <div class="format-strip" aria-label="支持的格式">
              <span>PDF</span>
              <span>DOCX</span>
              <span>PPTX</span>
              <span>XLSX</span>
              <span>HTML</span>
              <span>CSV</span>
              <span>JSON</span>
              <span>XML</span>
              <span>TXT</span>
            </div>
          </aside>
        </div>

        <div class="result-panel" id="resultPanel" hidden>
          <div>
            <p class="result-label" id="resultLabel">转换结果</p>
            <strong id="resultPath"></strong>
          </div>
          <button class="secondary-button" id="openLocationButton" type="button" hidden>打开输出目录</button>
        </div>
      </section>
    </main>

    <script src="../queue-utils.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
